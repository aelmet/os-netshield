# NetShield configd actions
# SPDX-License-Identifier: BSD-2-Clause
# Copyright (c) 2024-2026 NetShield Contributors
#
# All actions are invoked via: configctl netshield <action> [args...]
# Scripts live under: /usr/local/opnsense/scripts/netshield/
#
# type=script       → runs script, returns exit code only
# type=script_output → runs script, returns stdout to caller
#

# ---------------------------------------------------------------------------
# Daemon lifecycle
# ---------------------------------------------------------------------------

[start]
command:/usr/local/opnsense/scripts/netshield/netshield_daemon.py start
parameters:
type:script
message:Starting NetShield daemon
description:Start the NetShield network security daemon

[stop]
command:/usr/local/opnsense/scripts/netshield/netshield_daemon.py stop
parameters:
type:script
message:Stopping NetShield daemon
description:Stop the NetShield network security daemon

[restart]
command:/usr/local/opnsense/scripts/netshield/netshield_daemon.py restart
parameters:
type:script
message:Restarting NetShield daemon
description:Restart the NetShield network security daemon

[status]
command:/usr/local/opnsense/scripts/netshield/netshield_daemon.py status
parameters:
type:script_output
message:Retrieving NetShield daemon status
description:Return current daemon status as JSON

# ---------------------------------------------------------------------------
# Configuration reload
# ---------------------------------------------------------------------------

[reconfigure]
command:/usr/local/opnsense/scripts/netshield/netshield_daemon.py reconfigure
parameters:
type:script
message:Reloading NetShield configuration
description:Apply updated configuration without full daemon restart

# ---------------------------------------------------------------------------
# Alert management
# ---------------------------------------------------------------------------

[get_alerts]
command:/usr/local/opnsense/scripts/netshield/manage_alerts.py get %s
parameters:%s
type:script_output
message:Fetching NetShield alerts
description:Return recent alerts as JSON; optional filter parameters (limit, severity, type)

[flush_alerts]
command:/usr/local/opnsense/scripts/netshield/manage_alerts.py flush %s
parameters:%s
type:script
message:Flushing NetShield alerts
description:Clear stored alerts; optional parameter: all | older_than_days=N

[get_stats]
command:/usr/local/opnsense/scripts/netshield/manage_alerts.py stats %s
parameters:%s
type:script_output
message:Fetching NetShield statistics
description:Return aggregate statistics (blocked counts, top apps, top devices) as JSON

# ---------------------------------------------------------------------------
# Device management
# ---------------------------------------------------------------------------

[get_devices]
command:/usr/local/opnsense/scripts/netshield/manage_devices.py list %s
parameters:%s
type:script_output
message:Fetching tracked device list
description:Return all tracked devices with metadata as JSON; optional filter parameters

[quarantine_device]
command:/usr/local/opnsense/scripts/netshield/manage_devices.py quarantine %s
parameters:%s
type:script
message:Quarantining device
description:Place a device in quarantine (block all traffic); parameter: mac=<MAC>

[unquarantine_device]
command:/usr/local/opnsense/scripts/netshield/manage_devices.py unquarantine %s
parameters:%s
type:script
message:Releasing device from quarantine
description:Remove a device from quarantine; parameter: mac=<MAC>

# ---------------------------------------------------------------------------
# Bandwidth statistics
# ---------------------------------------------------------------------------

[get_bandwidth]
command:/usr/local/opnsense/scripts/netshield/manage_bandwidth.py get %s
parameters:%s
type:script_output
message:Fetching bandwidth statistics
description:Return per-device or per-application bandwidth stats as JSON; optional: mac=<MAC> or app=<name>

# ---------------------------------------------------------------------------
# Policy management
# ---------------------------------------------------------------------------

[manage_policy]
command:/usr/local/opnsense/scripts/netshield/manage_policy.py %s
parameters:%s
type:script_output
message:Managing NetShield policy
description:CRUD operations for blocking policies; parameters: action=list|add|update|delete [uuid=<UUID>] [json=<payload>]

# ---------------------------------------------------------------------------
# DNS filtering management
# ---------------------------------------------------------------------------

[manage_dns]
command:/usr/local/opnsense/scripts/netshield/manage_dns.py %s
parameters:%s
type:script_output
message:Managing NetShield DNS filtering
description:Manage DNS blocklists and overrides; parameters: action=list|add|delete|reload [json=<payload>]

# ---------------------------------------------------------------------------
# Web category management
# ---------------------------------------------------------------------------

[manage_webcategories]
command:/usr/local/opnsense/scripts/netshield/manage_webcategories.py %s
parameters:%s
type:script_output
message:Managing web category filters
description:Manage web content categories; parameters: action=list|enable|disable|custom [json=<payload>]

# ---------------------------------------------------------------------------
# Target list management
# ---------------------------------------------------------------------------

[manage_targetlists]
command:/usr/local/opnsense/scripts/netshield/manage_targetlists.py %s
parameters:%s
type:script_output
message:Managing target lists
description:Manage custom IP/domain blocklists; parameters: action=list|add|delete|sync|fetch [uuid=<UUID>] [json=<payload>]

# ---------------------------------------------------------------------------
# Application signature management
# ---------------------------------------------------------------------------

[manage_appsignatures]
command:/usr/local/opnsense/scripts/netshield/manage_appsignatures.py %s
parameters:%s
type:script_output
message:Managing application signatures
description:Manage app detection signatures (SNI, domain patterns); parameters: action=list|add|update|delete|import [json=<payload>]

# ---------------------------------------------------------------------------
# GeoIP management
# ---------------------------------------------------------------------------

[manage_geoip]
command:/usr/local/opnsense/scripts/netshield/manage_geoip.py %s
parameters:%s
type:script_output
message:Managing GeoIP configuration
description:Manage GeoIP country blocks and database; parameters: action=list|enable|disable|update|status [country=<CC>]

# ---------------------------------------------------------------------------
# Rule enforcement (apply all active rules to pf / Unbound)
# ---------------------------------------------------------------------------

[activate_enforcement]
command:/usr/local/opnsense/scripts/netshield/enforce.py all
parameters:
type:script
message:Activating all NetShield enforcement rules
description:Re-generate and reload all pf anchor rules and Unbound overrides

[enforce_apps]
command:/usr/local/opnsense/scripts/netshield/enforce.py apps
parameters:
type:script
message:Enforcing application blocking rules
description:Reload only application-layer pf and DNS rules

[enforce_categories]
command:/usr/local/opnsense/scripts/netshield/enforce.py categories
parameters:
type:script
message:Enforcing web category rules
description:Reload only web category DNS and pf rules

[enforce_targetlists]
command:/usr/local/opnsense/scripts/netshield/enforce.py targetlists
parameters:
type:script
message:Enforcing target list rules
description:Reload only custom target list pf and DNS rules

# ---------------------------------------------------------------------------
# Dashboard / visibility
# ---------------------------------------------------------------------------

[get_dashboard]
command:/usr/local/opnsense/scripts/netshield/manage_dashboard.py summary %s
parameters:%s
type:script_output
message:Fetching dashboard summary data
description:Return aggregated dashboard data (stats, top blocks, active alerts, device count) as JSON

[get_sessions]
command:/usr/local/opnsense/scripts/netshield/manage_sessions.py list %s
parameters:%s
type:script_output
message:Fetching active sessions
description:Return currently tracked network sessions as JSON; optional: mac=<MAC> or ip=<IP>

[get_topology]
command:/usr/local/opnsense/scripts/netshield/manage_topology.py get
parameters:
type:script_output
message:Fetching network topology
description:Return network topology graph (devices, VLANs, gateways) as JSON

# ---------------------------------------------------------------------------
# Threat feed updates
# ---------------------------------------------------------------------------

[update_feeds]
command:/usr/local/opnsense/scripts/netshield/update_feeds.py %s
parameters:%s
type:script
message:Updating NetShield threat intelligence feeds
description:Download and apply latest threat feeds; optional: feed=<name> or all (default: all)
