# NetShield configd actions
# All variable-arg commands use parameters:%s (single token, comma-delimited)
# Python scripts split on commas internally

[start]
command:/usr/local/opnsense/scripts/netshield/netshield_daemon.py start
type:script
message:Starting NetShield

[stop]
command:/usr/local/opnsense/scripts/netshield/netshield_daemon.py stop
type:script
message:Stopping NetShield

[restart]
command:/usr/local/opnsense/scripts/netshield/netshield_daemon.py restart
type:script
message:Restarting NetShield

[status]
command:/usr/local/opnsense/scripts/netshield/netshield_daemon.py status
type:script_output
message:NetShield status

[reconfigure]
command:/usr/local/opnsense/scripts/netshield/netshield_daemon.py restart
type:script
message:Reconfiguring NetShield

# ========== Alerts ==========

[get_alerts]
command:/usr/local/opnsense/scripts/netshield/get_alerts.py list
type:script_output
message:Querying alerts

[get_alert]
command:/usr/local/opnsense/scripts/netshield/get_alerts.py get
parameters:%s
type:script_output
message:Getting single alert

[get_stats]
command:/usr/local/opnsense/scripts/netshield/get_stats.py
type:script_output
message:Querying stats

[flush_alerts]
command:/usr/local/opnsense/scripts/netshield/get_alerts.py flush
type:script
message:Flushing alerts

[ack_alert]
command:/usr/local/opnsense/scripts/netshield/get_alerts.py ack
parameters:%s
type:script
message:Acknowledging alert

