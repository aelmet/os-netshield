# netshield.conf — auto-generated by OPNsense template engine
# DO NOT EDIT THIS FILE MANUALLY — changes will be overwritten.
# Modify settings via Services -> NetShield in the OPNsense UI.
#
# Generated: {{ generated_at | default('') }}
# Template:  OPNsense/NetShield/netshield.conf

[general]
# Master enable switch (1 = enabled, 0 = disabled)
enabled = {{ helpers.default(OPNsense.netshield.general.enabled, '0') }}

# Logging verbosity: debug | info | warning | error | critical
log_level = {{ helpers.default(OPNsense.netshield.general.log_level, 'info') }}

# How often the daemon polls for config/state changes (seconds)
check_interval = {{ helpers.default(OPNsense.netshield.general.check_interval, '60') }}

# Minimum time between repeated alerts for the same event (seconds)
alert_cooldown = {{ helpers.default(OPNsense.netshield.general.alert_cooldown, '300') }}

# Maximum number of alerts stored in the database
max_alerts = {{ helpers.default(OPNsense.netshield.general.max_alerts, '10000') }}

[dns]
# Enable Unbound-based DNS filtering
dns_filtering_enabled = {{ helpers.default(OPNsense.netshield.dns.dns_filtering_enabled, '0') }}

# Enforce safe search on major search engines (Google, Bing, YouTube, etc.)
safe_search = {{ helpers.default(OPNsense.netshield.dns.safe_search, '0') }}

# Block DNS-over-HTTPS (DoH) bypass attempts
block_doh = {{ helpers.default(OPNsense.netshield.dns.block_doh, '0') }}

# Block DNS-over-TLS (DoT, port 853) bypass attempts
block_dot = {{ helpers.default(OPNsense.netshield.dns.block_dot, '0') }}

# Custom DNS blocklist directory (one domain per line, .txt files)
custom_blocklist_dir = {{ helpers.default(OPNsense.netshield.dns.custom_blocklist_dir, '/var/db/netshield/dns_blocklists') }}

[detection]
# Enable deep packet inspection via Suricata (requires Suricata installed)
dpi_enabled = {{ helpers.default(OPNsense.netshield.detection.dpi_enabled, '0') }}

# Enable VPN/proxy/tunnel traffic detection
vpn_detection_enabled = {{ helpers.default(OPNsense.netshield.detection.vpn_detection_enabled, '0') }}

# Enable automatic device discovery via ARP/DHCP
device_tracking_enabled = {{ helpers.default(OPNsense.netshield.detection.device_tracking_enabled, '1') }}

# Device tracking scan interval (seconds)
device_scan_interval = {{ helpers.default(OPNsense.netshield.detection.device_scan_interval, '300') }}

# Network interfaces to monitor (comma-separated, e.g. em0,em1 — empty = all LAN interfaces)
monitor_interfaces = {{ helpers.default(OPNsense.netshield.detection.monitor_interfaces, '') }}

# Suricata alert log path (leave default unless you moved it)
suricata_alert_log = {{ helpers.default(OPNsense.netshield.detection.suricata_alert_log, '/var/log/suricata/eve.json') }}

[enforcement]
# Redirect all client DNS queries to the local Unbound resolver
# (prevents clients from using hard-coded upstream DNS)
force_dns = {{ helpers.default(OPNsense.netshield.enforcement.force_dns, '0') }}

# Block common VPN ports (OpenVPN 1194/tcp+udp, WireGuard 51820/udp,
# IPsec 500/udp+4500/udp, PPTP 1723/tcp, SSTP 443/tcp to non-local)
block_vpn_ports = {{ helpers.default(OPNsense.netshield.enforcement.block_vpn_ports, '0') }}

# Block common proxy ports (SOCKS 1080/tcp, HTTP CONNECT 3128/tcp+8080/tcp,
# Squid 8888/tcp, CGI proxies 8118/tcp)
block_proxy_ports = {{ helpers.default(OPNsense.netshield.enforcement.block_proxy_ports, '0') }}

# pf table name used for blocked IPs (shared across all rule sets)
pf_block_table = {{ helpers.default(OPNsense.netshield.enforcement.pf_block_table, 'netshield_blocked') }}

# pf table name for quarantined device IPs
pf_quarantine_table = {{ helpers.default(OPNsense.netshield.enforcement.pf_quarantine_table, 'netshield_quarantine') }}

[alerts]
# Forward alerts to an external syslog server
syslog_enabled = {{ helpers.default(OPNsense.netshield.alerts.syslog_enabled, '0') }}

# Syslog server hostname or IP address
syslog_host = {{ helpers.default(OPNsense.netshield.alerts.syslog_host, '') }}

# Syslog server port
syslog_port = {{ helpers.default(OPNsense.netshield.alerts.syslog_port, '514') }}

# Syslog transport protocol: udp | tcp | tls
syslog_protocol = {{ helpers.default(OPNsense.netshield.alerts.syslog_protocol, 'udp') }}

# Syslog facility (RFC 5424): local0 .. local7 | daemon | security
syslog_facility = {{ helpers.default(OPNsense.netshield.alerts.syslog_facility, 'local4') }}

[geoip]
# Enable GeoIP country-based blocking
geoip_enabled = {{ helpers.default(OPNsense.netshield.geoip.geoip_enabled, '0') }}

# MaxMind GeoLite2-Country database path
# Download from: https://dev.maxmind.com/geoip/geolite2-free-geolocation-data
geoip_db_path = {{ helpers.default(OPNsense.netshield.geoip.geoip_db_path, '/var/db/netshield/geoip/GeoLite2-Country.mmdb') }}

# Comma-separated list of ISO 3166-1 alpha-2 country codes to block
# Example: CN,RU,KP,IR
geoip_blocked_countries = {{ helpers.default(OPNsense.netshield.geoip.geoip_blocked_countries, '') }}

# Block direction: both | inbound | outbound
geoip_direction = {{ helpers.default(OPNsense.netshield.geoip.geoip_direction, 'both') }}

[webcategories]
# Enable web category blocking
webcategories_enabled = {{ helpers.default(OPNsense.netshield.webcategories.webcategories_enabled, '0') }}

# Path to category definition files
categories_dir = {{ helpers.default(OPNsense.netshield.webcategories.categories_dir, '/var/db/netshield/webcategories') }}

[targetlists]
# Directory where synced target list files are stored
targetlists_dir = {{ helpers.default(OPNsense.netshield.targetlists.targetlists_dir, '/var/db/netshield/targetlists') }}

# Default sync interval for external lists (seconds)
targetlists_sync_interval = {{ helpers.default(OPNsense.netshield.targetlists.targetlists_sync_interval, '86400') }}
